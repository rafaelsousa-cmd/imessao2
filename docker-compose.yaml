services:
  backend:
    build:
      context: backend
      dockerfile: dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
    - .env
    depends_on:
      db:
    condition: service_healthy



    db:
      env_file:
      - .env
  image: postgres:14
  ports:
    - "5432:5432"
  environment:
     POSTGRES_USER: ${DB_USER}
     POSTGRES_PASSWORD: ${DB_PASSWORD}
     POSTGRES_DB: ${DB_NAME}
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
    interval: 10s
    retries: 5
    volumes:
    - db_data:/var/lib/postgresql/data

volumes:
  db_data:
    driver: local
